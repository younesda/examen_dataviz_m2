services:
  - type: web
    runtime: python
    name: younes-hachami-dataviz
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --bind 0.0.0.0:$PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: DASH_DEBUG
        value: "false"
      - key: PROJECT_GITHUB_URL
        value: "https://github.com/younesda/examen_dataviz_m2"
      - key: MONGO_URI
        sync: false
